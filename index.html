<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowChat - Private Messaging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a1a;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* Auth Forms */
        .auth-container {
            padding: 40px;
            background: #1a1a1a;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .auth-form {
            max-width: 380px;
            width: 100%;
            margin: 0 auto;
        }

        .auth-form h2 {
            background: linear-gradient(135deg, #a78bfa 0%, #ec489a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            font-size: 2em;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: 500;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            font-size: 15px;
            color: #ffffff;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #a78bfa;
            background: #2f2f2f;
        }

        .input-group input::placeholder {
            color: #6b7280;
        }

        button {
            background: linear-gradient(135deg, #a78bfa 0%, #ec489a 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px rgba(167, 139, 250, 0.4);
        }

        .switch-auth {
            margin-top: 24px;
            color: #9ca3af;
            font-size: 0.9em;
        }

        .switch-auth a {
            color: #a78bfa;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .switch-auth a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .success-message {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        /* Main App */
        .app-container {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .header {
            background: #0f0f0f;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .header h2 {
            background: linear-gradient(135deg, #a78bfa 0%, #ec489a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.5em;
        }

        .user-info {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .username-display {
            color: #a78bfa;
            font-weight: 600;
            font-size: 0.95em;
            background: rgba(167, 139, 250, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            width: auto;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: none;
            box-shadow: none;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #0f0f0f;
        }

        .message {
            background: #1a1a1a;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 1px solid #2a2a2a;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
        }

        .message-sender {
            font-weight: 600;
            color: #a78bfa;
            font-size: 0.9em;
        }

        .message-time {
            color: #6b7280;
            font-size: 0.75em;
        }

        .message-content {
            color: #e5e7eb;
            line-height: 1.5;
            font-size: 0.95em;
        }

        .message-input-container {
            padding: 20px 24px;
            background: #0f0f0f;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            font-size: 14px;
            color: #ffffff;
            resize: none;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: #a78bfa;
            background: #1f1f1f;
        }

        .message-input::placeholder {
            color: #6b7280;
        }

        .send-btn {
            width: auto;
            padding: 12px 28px;
        }

        .empty-messages {
            text-align: center;
            color: #6b7280;
            padding: 60px 20px;
            font-size: 0.9em;
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }
            
            .message-input-container {
                flex-direction: column;
            }
            
            .send-btn {
                width: 100%;
            }

            .auth-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Authentication Section -->
        <div id="authSection" class="auth-container">
            <div class="auth-form">
                <h2>✦ ShadowChat</h2>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <div id="loginForm">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter your username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button onclick="login()">Sign In</button>
                    <div class="switch-auth">
                        No account? <a onclick="showRegister()">Create one</a>
                    </div>
                </div>

                <div id="registerForm" style="display:none;">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" placeholder="Choose a username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Choose a password">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                    </div>
                    <button onclick="register()">Create Account</button>
                    <div class="switch-auth">
                        Already have an account? <a onclick="showLogin()">Sign in</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main App Section -->
        <div id="appSection" class="app-container">
            <div class="header">
                <h2>✦ ShadowChat</h2>
                <div class="user-info">
                    <span class="username-display" id="currentUsername"></span>
                    <button onclick="logout()" class="logout-btn">Exit</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-messages">No messages yet. Start the conversation!</div>
            </div>
            <div class="message-input-container">
                <textarea class="message-input" id="messageInput" rows="2" placeholder="Type your message..."></textarea>
                <button onclick="sendMessage()" class="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let users = {};
        let messages = [];
        let currentUser = null;

        // Load data from localStorage
        function loadData() {
            const storedUsers = localStorage.getItem('shadowchat_users');
            const storedMessages = localStorage.getItem('shadowchat_messages');
            
            if (storedUsers) {
                users = JSON.parse(storedUsers);
            } else {
                users = {};
                saveUsers();
            }
            
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
            } else {
                messages = [];
                saveMessages();
            }
        }

        function saveUsers() {
            localStorage.setItem('shadowchat_users', JSON.stringify(users));
        }

        function saveMessages() {
            localStorage.setItem('shadowchat_messages', JSON.stringify(messages));
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }

            if (password.length < 4) {
                showError('Password must be at least 4 characters');
                return;
            }

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            if (users[username]) {
                showError('Username already exists');
                return;
            }

            // Create new user
            users[username] = {
                username: username,
                password: btoa(password),
                createdAt: new Date().toISOString()
            };
            saveUsers();

            showSuccess('Account created successfully!');
            setTimeout(() => {
                showLogin();
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }, 1500);
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            const user = users[username];
            if (!user || user.password !== btoa(password)) {
                showError('Invalid username or password');
                return;
            }

            currentUser = username;
            localStorage.setItem('shadowchat_currentUser', currentUser);
            
            // Switch to main app
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'flex';
            document.getElementById('currentUsername').textContent = currentUser;
            
            loadMessages();
            
            // Clear login fields
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('shadowchat_currentUser');
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('appSection').style.display = 'none';
        }

        function sendMessage() {
            if (!currentUser) return;
            
            const messageInput = document.getElementById('messageInput');
            const content = messageInput.value.trim();
            
            if (!content) return;

            const newMessage = {
                id: Date.now(),
                sender: currentUser,
                content: content,
                timestamp: new Date().toISOString()
            };
            
            messages.push(newMessage);
            saveMessages();
            
            messageInput.value = '';
            loadMessages();
        }

        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-messages">No messages yet. Start the conversation!</div>';
                return;
            }
            
            // Sort messages by timestamp
            const sortedMessages = [...messages].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            container.innerHTML = sortedMessages.map(message => `
                <div class="message">
                    <div class="message-header">
                        <span class="message-sender">${escapeHtml(message.sender)}</span>
                        <span class="message-time">${formatTime(message.timestamp)}</span>
                    </div>
                    <div class="message-content">${escapeHtml(message.content)}</div>
                </div>
            `).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
            if (diff < 86400000) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check for existing session
        function checkSession() {
            const savedUser = localStorage.getItem('shadowchat_currentUser');
            if (savedUser && users[savedUser]) {
                currentUser = savedUser;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'flex';
                document.getElementById('currentUsername').textContent = currentUser;
                loadMessages();
            }
        }

        // Auto-refresh messages
        let refreshInterval = null;
        
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (currentUser) {
                    loadMessages();
                }
            }, 2000);
        }

        // Initialize
        loadData();
        checkSession();
        startAutoRefresh();

        // Allow Enter to send (Shift+Enter for new line)
        document.addEventListener('DOMContentLoaded', () => {
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        });
    </script>
</body>
</html>
