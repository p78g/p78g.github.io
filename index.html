<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ShadowChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-container {
            padding: 40px;
            background: #1a1a1a;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .auth-form {
            max-width: 380px;
            width: 100%;
            margin: 0 auto;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: 500;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            font-size: 15px;
            color: #ffffff;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #25D366;
            background: #2f2f2f;
        }

        button {
            background: #25D366;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background: #20b859;
            transform: translateY(-1px);
        }

        .switch-auth {
            margin-top: 24px;
            color: #9ca3af;
            font-size: 0.9em;
        }

        .switch-auth a {
            color: #25D366;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .error-message, .success-message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
        }

        .error-message {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .success-message {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .app-container {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
        }

        .header {
            background: #1a1a1a;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-left: auto;
        }

        .username-display {
            color: #25D366;
            font-weight: 600;
            background: rgba(37, 211, 102, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            width: auto;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #25D366;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1a1a1a;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        .message-sender {
            font-size: 0.7em;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .message.sent .message-sender {
            color: rgba(255, 255, 255, 0.9);
            text-align: right;
        }

        .message.received .message-sender {
            color: #25D366;
        }

        .message-content {
            font-size: 0.95em;
            line-height: 1.4;
            word-break: break-word;
        }

        .link-embed {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .embed-video iframe {
            width: 100%;
            height: 225px;
            border: none;
            border-radius: 8px;
        }

        .embed-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            text-decoration: none;
            color: inherit;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 4px;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .edited-indicator {
            font-size: 0.7em;
            font-weight: 500;
            margin-left: 6px;
            color: #a78bfa;
            background: rgba(167, 139, 250, 0.15);
            padding: 2px 6px;
            border-radius: 12px;
            display: inline-block;
        }

        .message-time {
            font-size: 0.65em;
            margin-top: 4px;
            display: block;
            text-align: right;
            opacity: 0.7;
        }

        .action-menu {
            position: fixed;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 1000;
            min-width: 140px;
        }

        .action-menu-item {
            padding: 10px 16px;
            background: none;
            border: none;
            color: #e5e7eb;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            border-radius: 10px;
            width: 100%;
        }

        .action-menu-item:hover {
            background: #3a3a3a;
        }

        .action-menu-item.delete {
            color: #f87171;
        }

        .action-menu-divider {
            height: 1px;
            background: #3a3a3a;
            margin: 4px 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-input-container {
            padding: 16px 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: #2a2a2a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: #9ca3af;
            stroke-width: 1.5;
            fill: none;
        }

        .icon-btn.active {
            background: #f87171;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            font-size: 15px;
            color: #ffffff;
            resize: none;
            font-family: inherit;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #25D366;
        }

        .send-btn {
            background: #25D366;
            padding: 12px 24px;
            width: auto;
            border-radius: 24px;
        }

        .empty-messages {
            text-align: center;
            color: #6b7280;
            padding: 60px 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            margin: 16px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="authSection" class="auth-container">
            <div class="auth-form">
                <h1 style="background: linear-gradient(135deg, #a78bfa, #ec489a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 32px;">ShadowChat</h1>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <div id="loginForm">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password">
                    </div>
                    <button id="loginBtn">Sign In</button>
                    <div class="switch-auth">
                        No account? <a id="showRegisterLink">Create one</a>
                    </div>
                </div>

                <div id="registerForm" style="display:none;">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" placeholder="Choose username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Choose password">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password">
                    </div>
                    <button id="registerBtn">Create Account</button>
                    <div class="switch-auth">
                        Already have an account? <a id="showLoginLink">Sign in</a>
                    </div>
                </div>
            </div>
        </div>

        <div id="appSection" class="app-container">
            <div class="header">
                <div class="user-info">
                    <span class="username-display" id="currentUsername"></span>
                    <button id="logoutBtn" class="logout-btn">Exit</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-messages">No messages yet. Start the conversation!</div>
            </div>
            <div class="message-input-container">
                <div class="input-buttons">
                    <button id="imageUploadBtn" class="icon-btn">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
                            <circle cx="8.5" cy="8.5" r="2.5" />
                            <path d="M21 15l-5-4-3 3-4-4-5 5" />
                        </svg>
                    </button>
                    <button id="micBtn" class="icon-btn">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="22" />
                        </svg>
                    </button>
                </div>
                <textarea id="messageInput" class="message-input" rows="1" placeholder="Type a message..."></textarea>
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    <div id="actionMenu" class="action-menu">
        <button id="editAction" class="action-menu-item">Edit</button>
        <div class="action-menu-divider"></div>
        <button id="deleteAction" class="action-menu-item delete">Delete</button>
    </div>
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="color: white; margin-bottom: 16px;">Edit Message</h3>
            <textarea id="editText" rows="3"></textarea>
            <div class="modal-buttons">
                <button id="saveEditBtn">Save</button>
                <button id="cancelEditBtn" style="background: #3a3a3a;">Cancel</button>
            </div>
        </div>
    </div>
    <div id="imageModal" class="image-modal">
        <img id="modalImage" src="">
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    
    <script type="module">
        // USING YOUR EXISTING FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBJ8wf399dp0nxFYl8y7SoarcDUOiZ7Wow",
            authDomain: "chatappv2-b6bd8.firebaseapp.com",
            projectId: "chatappv2-b6bd8",
            storageBucket: "chatappv2-b6bd8.firebasestorage.app",
            messagingSenderId: "458480303979",
            appId: "1:458480303979:web:a3a83ed05856d23df6d62e",
            measurementId: "G-ZS3DQJS2HW"
        };

        import { initializeApp } from "firebase/app";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc, updateDoc, Timestamp, getDocs, where } from "firebase/firestore";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM elements
        const authSection = document.getElementById('authSection');
        const appSection = document.getElementById('appSection');
        const currentUsernameSpan = document.getElementById('currentUsername');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const micBtn = document.getElementById('micBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const registerUsername = document.getElementById('registerUsername');
        const registerPassword = document.getElementById('registerPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const imageInput = document.getElementById('imageInput');
        const actionMenu = document.getElementById('actionMenu');
        const editModal = document.getElementById('editModal');
        const editText = document.getElementById('editText');
        const imageModal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');

        let currentUserId = null;
        let currentUsername = "";
        let messages = [];
        let messagesUnsubscribe = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let selectedMessageId = null;
        let currentAudio = null;
        let pressTimer = null;
        let editingMessageId = null;

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 3000);
        }

        function showSuccess(msg) {
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 3000);
        }

        // Long press handlers
        function startLongPress(messageId, event) {
            pressTimer = setTimeout(() => {
                const message = messages.find(m => m.id === messageId);
                if (message && message.senderId === currentUserId) {
                    selectedMessageId = messageId;
                    let x = event.clientX || (event.touches ? event.touches[0].clientX : 0);
                    let y = event.clientY || (event.touches ? event.touches[0].clientY : 0);
                    actionMenu.style.display = 'flex';
                    actionMenu.style.left = (x - 70) + 'px';
                    actionMenu.style.top = (y - 60) + 'px';
                    setTimeout(() => {
                        document.addEventListener('click', closeActionMenu);
                    }, 0);
                }
            }, 500);
        }

        function cancelLongPress() {
            if (pressTimer) clearTimeout(pressTimer);
        }

        function closeActionMenu() {
            actionMenu.style.display = 'none';
            selectedMessageId = null;
            document.removeEventListener('click', closeActionMenu);
        }

        function editSelectedMessage() {
            if (selectedMessageId) {
                const message = messages.find(m => m.id === selectedMessageId);
                if (message) {
                    editingMessageId = selectedMessageId;
                    editText.value = message.content;
                    editModal.style.display = 'flex';
                }
                closeActionMenu();
            }
        }

        async function deleteSelectedMessage() {
            if (selectedMessageId) {
                if (confirm("Delete this message?")) {
                    await deleteDoc(doc(db, "messages", selectedMessageId));
                }
                closeActionMenu();
            }
        }

        // Voice Recording
        async function startVoiceRecording() {
            if (isRecording) {
                if (mediaRecorder) mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('active');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        addDoc(collection(db, "messages"), {
                            senderId: currentUserId,
                            senderName: currentUsername,
                            type: "voice",
                            content: reader.result,
                            timestamp: Timestamp.now(),
                            edited: false
                        });
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('active');
                showSuccess("Recording... Tap again to stop");
                setTimeout(() => {
                    if (isRecording && mediaRecorder) mediaRecorder.stop();
                    isRecording = false;
                    micBtn.classList.remove('active');
                }, 60000);
            } catch (err) {
                showError("Microphone access denied");
            }
        }

        // Image Upload
        function handleImageUpload(input) {
            const file = input.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addDoc(collection(db, "messages"), {
                        senderId: currentUserId,
                        senderName: currentUsername,
                        type: "image",
                        content: e.target.result,
                        timestamp: Timestamp.now(),
                        edited: false
                    });
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }

        // Play Voice
        function playVoice(audioData, btnElement) {
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                currentAudio = null;
                btnElement.innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3" /></svg>`;
                return;
            }
            const audio = new Audio(audioData);
            currentAudio = audio;
            btnElement.innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="16" height="16"><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></svg>`;
            audio.play();
            audio.onended = () => {
                currentAudio = null;
                btnElement.innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3" /></svg>`;
            };
        }

        // Detect and embed links
        function detectAndEmbedLinks(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const urls = text.match(urlRegex);
            if (!urls) return { text, embeds: [] };
            let processedText = text;
            const embeds = [];
            for (const url of urls) {
                if (url.includes('youtube.com/watch') || url.includes('youtu.be/')) {
                    let videoId = '';
                    if (url.includes('youtu.be/')) {
                        videoId = url.split('youtu.be/')[1].split('?')[0];
                    } else {
                        videoId = url.split('v=')[1]?.split('&')[0];
                    }
                    if (videoId) {
                        embeds.push({ type: 'youtube', url: `https://www.youtube.com/embed/${videoId}` });
                        processedText = processedText.replace(url, '');
                    }
                } else {
                    embeds.push({ type: 'link', url: url });
                }
            }
            return { text: processedText.trim(), embeds };
        }

        // Send text message
        async function sendMessage() {
            if (!currentUserId) return;
            const content = messageInput.value.trim();
            if (!content) return;
            const { text, embeds } = detectAndEmbedLinks(content);
            await addDoc(collection(db, "messages"), {
                senderId: currentUserId,
                senderName: currentUsername,
                type: "text",
                content: text,
                embeds: embeds,
                timestamp: Timestamp.now(),
                edited: false
            });
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }

        // Save edited message
        async function saveEdit() {
            const newContent = editText.value.trim();
            if (newContent && editingMessageId) {
                const msgRef = doc(db, "messages", editingMessageId);
                await updateDoc(msgRef, {
                    content: newContent,
                    edited: true,
                    editedAt: Timestamp.now()
                });
            }
            editModal.style.display = 'none';
            editingMessageId = null;
        }

        // View Image
        function viewImage(imageData) {
            modalImage.src = imageData;
            imageModal.style.display = 'flex';
        }

        function closeImageModal() {
            imageModal.style.display = 'none';
        }

        // Render messages
        function renderMessages() {
            if (!messagesContainer) return;
            if (!messages.length) {
                messagesContainer.innerHTML = '<div class="empty-messages">No messages yet. Start the conversation!</div>';
                return;
            }
            const sorted = [...messages].sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            messagesContainer.innerHTML = sorted.map(msg => {
                const isSent = msg.senderId === currentUserId;
                let contentHtml = '';
                if (msg.type === 'image') {
                    contentHtml = `<img src="${msg.content}" class="message-image" onclick="window.viewImageExternal('${msg.content}')" style="pointer-events: auto;">`;
                } else if (msg.type === 'voice') {
                    contentHtml = `
                        <div class="voice-message">
                            <button class="play-btn" onclick="window.playVoiceExternal('${msg.content}', this)" style="pointer-events: auto;">
                                <svg viewBox="0 0 24 24" fill="white" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3" /></svg>
                            </button>
                            <span class="voice-duration">Voice note</span>
                        </div>
                    `;
                } else {
                    let textContent = escapeHtml(msg.content);
                    if (textContent === '') textContent = ' ';
                    contentHtml = `<div class="message-content">${textContent}</div>`;
                    if (msg.embeds && msg.embeds.length > 0) {
                        msg.embeds.forEach(embed => {
                            if (embed.type === 'youtube') {
                                contentHtml += `
                                    <div class="link-embed">
                                        <div class="embed-video">
                                            <iframe src="${embed.url}" frameborder="0" allowfullscreen></iframe>
                                        </div>
                                    </div>
                                `;
                            } else if (embed.type === 'link') {
                                contentHtml += `
                                    <a href="${embed.url}" target="_blank" class="link-embed embed-link" style="pointer-events: auto;">
                                        <div class="embed-info">
                                            <div class="embed-url">${escapeHtml(embed.url)}</div>
                                            <div class="embed-title">Open Link</div>
                                        </div>
                                    </a>
                                `;
                            }
                        });
                    }
                }
                const editedHtml = msg.edited ? '<span class="edited-indicator">edited</span>' : '';
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}"
                         onmousedown="window.startLongPressExternal('${msg.id}', event)"
                         ontouchstart="window.startLongPressExternal('${msg.id}', event)"
                         onmouseup="window.cancelLongPressExternal()"
                         ontouchend="window.cancelLongPressExternal()"
                         onmouseleave="window.cancelLongPressExternal()">
                        <div class="message-bubble">
                            <span class="message-sender">${escapeHtml(msg.senderName)}</span>
                            ${contentHtml}
                            <span class="message-time">${formatTime(msg.timestamp)}${editedHtml}</span>
                        </div>
                    </div>
                `;
            }).join('');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function formatTime(ts) {
            const date = new Date(ts);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'now';
            if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
            if (diff < 86400000) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return date.toLocaleDateString([], {month:'short', day:'numeric'});
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Real-time listener
        function loadMessagesRealtime() {
            if (messagesUnsubscribe) messagesUnsubscribe();
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                messages = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const timestamp = data.timestamp?.toDate() || new Date();
                    messages.push({
                        id: doc.id,
                        ...data,
                        timestamp: timestamp.toISOString()
                    });
                });
                renderMessages();
            });
        }

        // Auth functions
        async function register() {
            const username = registerUsername.value.trim();
            const password = registerPassword.value;
            const confirm = confirmPassword.value;
            if (!username || !password) return showError('Fill all fields');
            if (password !== confirm) return showError('Passwords do not match');
            if (username.length < 3) return showError('Username must be at least 3 characters');
            if (password.length < 4) return showError('Password must be at least 4 characters');
            
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("username", "==", username));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) return showError("Username already taken");
            
            const email = `${username}@shadowchat.local`;
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await addDoc(collection(db, "users"), {
                    uid: userCred.user.uid,
                    username: username,
                    email: email
                });
                showSuccess('Account created! You are now logged in.');
                registerUsername.value = '';
                registerPassword.value = '';
                confirmPassword.value = '';
            } catch (err) {
                showError(err.message);
            }
        }

        async function login() {
            const username = loginUsername.value.trim();
            const password = loginPassword.value;
            if (!username || !password) return showError('Enter username and password');
            
            const usersRef = collection(db, "users");
            const q = query(usersRef, where("username", "==", username));
            const querySnapshot = await getDocs(q);
            if (querySnapshot.empty) return showError("User not found");
            
            const userDoc = querySnapshot.docs[0];
            const email = userDoc.data().email;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                loginUsername.value = '';
                loginPassword.value = '';
            } catch (err) {
                showError("Invalid password");
            }
        }

        async function logout() {
            await signOut(auth);
        }

        // Auth state listener
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("uid", "==", user.uid));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    currentUsername = querySnapshot.docs[0].data().username;
                } else {
                    currentUsername = user.email.split('@')[0];
                }
                authSection.style.display = 'none';
                appSection.style.display = 'flex';
                currentUsernameSpan.textContent = currentUsername;
                loadMessagesRealtime();
            } else {
                if (messagesUnsubscribe) messagesUnsubscribe();
                authSection.style.display = 'flex';
                appSection.style.display = 'none';
                currentUserId = null;
                currentUsername = "";
                messages = [];
                if (currentAudio) currentAudio.pause();
            }
        });

        // Attach event listeners
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('registerBtn').addEventListener('click', register);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('showRegisterLink').addEventListener('click', () => {
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
        });
        document.getElementById('showLoginLink').addEventListener('click', () => {
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
        });
        document.getElementById('imageUploadBtn').addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', () => handleImageUpload(imageInput));
        document.getElementById('micBtn').addEventListener('click', startVoiceRecording);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('editAction').addEventListener('click', editSelectedMessage);
        document.getElementById('deleteAction').addEventListener('click', deleteSelectedMessage);
        document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
        document.getElementById('cancelEditBtn').addEventListener('click', () => {
            editModal.style.display = 'none';
            editingMessageId = null;
        });
        imageModal.addEventListener('click', closeImageModal);

        // Expose external functions
        window.startLongPressExternal = startLongPress;
        window.cancelLongPressExternal = cancelLongPress;
        window.viewImageExternal = viewImage;
        window.playVoiceExternal = playVoice;

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
