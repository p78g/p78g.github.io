<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ShadowChat - Public & Private Chats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }

        /* Auth Screen */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .auth-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
        }

        .auth-box h1 {
            background: linear-gradient(135deg, #a78bfa, #ec489a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            font-size: 15px;
            color: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #25D366;
        }

        .auth-btn {
            background: #25D366;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .switch-auth {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
        }

        .switch-auth a {
            color: #25D366;
            cursor: pointer;
        }

        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .error-msg {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .success-msg {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        /* Main App */
        .app-main {
            display: none;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #2a2a2a;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .username-display {
            color: #25D366;
            font-weight: 600;
            background: rgba(37, 211, 102, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            color: white;
        }

        .new-chat-btn {
            width: 100%;
            background: #25D366;
            padding: 10px;
            border-radius: 12px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .chat-item {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .chat-item:hover {
            background: #2a2a2a;
        }

        .chat-item.active {
            background: #2a2a2a;
            border-left: 3px solid #25D366;
        }

        .chat-name {
            font-weight: 600;
            color: white;
        }

        .chat-type {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #1a1a1a;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: none;
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            color: white;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .chat-subtitle {
            font-size: 12px;
            color: #9ca3af;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            position: relative;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            cursor: pointer;
        }

        .message.sent .message-bubble {
            background: #25D366;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1a1a1a;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        .message-sender {
            font-size: 0.7em;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .message.sent .message-sender {
            text-align: right;
        }

        .message.received .message-sender {
            color: #25D366;
        }

        .message-content {
            font-size: 0.95em;
            line-height: 1.4;
            word-break: break-word;
        }

        .link-embed {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .embed-video iframe {
            width: 100%;
            height: 225px;
            border: none;
        }

        .embed-link {
            padding: 12px;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .embed-url {
            font-size: 0.7em;
            opacity: 0.7;
            word-break: break-all;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 4px;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .edited-indicator {
            font-size: 0.7em;
            margin-left: 6px;
            color: #a78bfa;
        }

        .message-time {
            font-size: 0.65em;
            margin-top: 4px;
            display: block;
            text-align: right;
            opacity: 0.7;
        }

        .action-menu {
            position: fixed;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            z-index: 1000;
            min-width: 140px;
        }

        .action-menu-item {
            padding: 10px 16px;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            border-radius: 10px;
        }

        .action-menu-item:hover {
            background: #3a3a3a;
        }

        .action-menu-item.delete {
            color: #f87171;
        }

        .message-input-container {
            padding: 16px 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: #2a2a2a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: #9ca3af;
            fill: none;
        }

        .icon-btn.active {
            background: #f87171;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            color: white;
            resize: none;
            font-family: inherit;
        }

        .send-btn {
            background: #25D366;
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }

        .user-search {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            margin: 16px 0;
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
        }

        .user-item:hover {
            background: #2a2a2a;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -300px;
                top: 0;
                bottom: 0;
                z-index: 50;
                transition: left 0.3s;
            }
            .sidebar.open {
                left: 0;
            }
            .back-btn {
                display: block;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/parse/4.2.0/parse.min.js"></script>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-box">
            <h1>ShadowChat</h1>
            <div id="authError" class="error-msg"></div>
            <div id="authSuccess" class="success-msg"></div>
            
            <div id="loginPanel">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <button class="auth-btn" id="loginBtn">Sign In</button>
                <div class="switch-auth">
                    No account? <a id="showRegister">Create one</a>
                </div>
            </div>

            <div id="registerPanel" style="display:none;">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Password">
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" placeholder="Confirm Password">
                </div>
                <button class="auth-btn" id="registerBtn">Create Account</button>
                <div class="switch-auth">
                    Already have an account? <a id="showLogin">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="app-main">
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <span class="username-display" id="sidebarUsername"></span>
                    <button class="logout-btn" id="sidebarLogout">Exit</button>
                </div>
                <button class="new-chat-btn" id="newChatBtn">+ New Private Chat</button>
            </div>
            <div class="chats-list" id="chatsList"></div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">← Back</button>
                <div>
                    <div class="chat-title" id="chatTitle">Select a chat</div>
                    <div class="chat-subtitle" id="chatSubtitle"></div>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-messages" style="text-align:center; color:#6b7280; padding:60px;">Select a chat to start messaging</div>
            </div>
            <div class="message-input-container" id="inputContainer" style="display:none;">
                <div class="input-buttons">
                    <button class="icon-btn" id="imageBtn">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
                            <circle cx="8.5" cy="8.5" r="2.5" />
                            <path d="M21 15l-5-4-3 3-4-4-5 5" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="voiceBtn">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="22" />
                        </svg>
                    </button>
                </div>
                <textarea id="messageInput" class="message-input" rows="1" placeholder="Type a message..."></textarea>
                <button id="sendBtn" class="send-btn">Send</button>
            </div>
        </div>
    </div>

    <input type="file" id="imageFile" accept="image/*" style="display:none;">
    
    <!-- New Chat Modal -->
    <div id="newChatModal" class="modal">
        <div class="modal-content">
            <h3 style="color:white; margin-bottom:16px;">Start a Private Chat</h3>
            <input type="text" id="userSearch" class="user-search" placeholder="Search users...">
            <div id="userList" class="user-list"></div>
            <button id="closeModalBtn" style="margin-top:16px; background:#3a3a3a; color:white; padding:10px; border:none; border-radius:12px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <!-- Action Menu -->
    <div id="actionMenu" class="action-menu">
        <button id="editAction" class="action-menu-item">Edit</button>
        <div style="height:1px; background:#3a3a3a; margin:4px 0;"></div>
        <button id="deleteAction" class="action-menu-item delete">Delete</button>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="color:white;">Edit Message</h3>
            <textarea id="editText" rows="3" style="width:100%; padding:12px; background:#2a2a2a; border:1px solid #3a3a3a; border-radius:12px; color:white; margin:16px 0;"></textarea>
            <div style="display:flex; gap:12px;">
                <button id="saveEditBtn" style="flex:1; background:#25D366; padding:10px; border:none; border-radius:12px; color:white;">Save</button>
                <button id="cancelEditBtn" style="flex:1; background:#3a3a3a; padding:10px; border:none; border-radius:12px; color:white;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Parse with your Back4App credentials
        Parse.initialize("af3nhQVRaFT5o5ZjYyQfztZZSMxCNT6VFhevLQvZ", "AjRAxMvX8gNQMIGHcJ0icjaIZRa8og37GF9wjDLU");
        Parse.serverURL = 'https://parseapi.back4app.com/';

        let currentUser = null;
        let currentChat = null;
        let currentChatType = null;
        let currentChatPartner = null;
        let messagesSubscription = null;
        let pressTimer = null;
        let selectedMessage = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // DOM Elements
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const chatsList = document.getElementById('chatsList');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const inputContainer = document.getElementById('inputContainer');
        const chatTitle = document.getElementById('chatTitle');
        const chatSubtitle = document.getElementById('chatSubtitle');
        const sidebarUsername = document.getElementById('sidebarUsername');
        const actionMenu = document.getElementById('actionMenu');
        const editModal = document.getElementById('editModal');
        const editText = document.getElementById('editText');

        // Helper functions
        function showError(msg) {
            authError.textContent = msg;
            authError.style.display = 'block';
            setTimeout(() => authError.style.display = 'none', 3000);
        }

        function showSuccess(msg) {
            authSuccess.textContent = msg;
            authSuccess.style.display = 'block';
            setTimeout(() => authSuccess.style.display = 'none', 3000);
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'now';
            if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
            if (diff < 86400000) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function detectLinks(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const urls = text.match(urlRegex);
            if (!urls) return { text, embeds: [] };
            let processedText = text;
            const embeds = [];
            for (const url of urls) {
                if (url.includes('youtube.com/watch') || url.includes('youtu.be/')) {
                    let videoId = '';
                    if (url.includes('youtu.be/')) {
                        videoId = url.split('youtu.be/')[1].split('?')[0];
                    } else {
                        videoId = url.split('v=')[1]?.split('&')[0];
                    }
                    if (videoId) {
                        embeds.push({ type: 'youtube', url: `https://www.youtube.com/embed/${videoId}` });
                        processedText = processedText.replace(url, '');
                    }
                } else {
                    embeds.push({ type: 'link', url: url });
                }
            }
            return { text: processedText.trim(), embeds };
        }

        // Load chats
        async function loadChats() {
            if (!currentUser) return;
            
            const PublicChat = Parse.Object.extend("PublicChat");
            const query = new Parse.Query(PublicChat);
            query.equalTo("participants", currentUser.id);
            const publicChats = await query.find();
            
            const PrivateChat = Parse.Object.extend("PrivateChat");
            const privateQuery = new Parse.Query(PrivateChat);
            privateQuery.contains("participants", currentUser.id);
            const privateChats = await privateQuery.find();
            
            chatsList.innerHTML = '';
            
            // Public Chat
            const publicDiv = document.createElement('div');
            publicDiv.className = `chat-item ${currentChat === 'public' ? 'active' : ''}`;
            publicDiv.innerHTML = `
                <div class="chat-name">🌐 Public Chat</div>
                <div class="chat-type">Everyone can see</div>
            `;
            publicDiv.onclick = () => openChat('public', null, 'Public Chat');
            chatsList.appendChild(publicDiv);
            
            // Private Chats
            for (const chat of privateChats) {
                const participants = chat.get('participants');
                const otherId = participants.find(p => p !== currentUser.id);
                const otherUser = await new Parse.Query(Parse.User).get(otherId);
                const chatName = otherUser.get('username');
                const div = document.createElement('div');
                div.className = `chat-item ${currentChat === chat.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="chat-name">🔒 ${escapeHtml(chatName)}</div>
                    <div class="chat-type">Private chat</div>
                `;
                div.onclick = () => openChat('private', chat.id, chatName);
                chatsList.appendChild(div);
            }
        }

        // Open a chat
        async function openChat(type, chatId, title) {
            if (messagesSubscription) {
                messagesSubscription.unsubscribe();
            }
            
            currentChat = chatId || type;
            currentChatType = type;
            chatTitle.textContent = title;
            chatSubtitle.textContent = type === 'public' ? 'Public chat - everyone can see' : 'Private conversation';
            inputContainer.style.display = 'flex';
            
            // Load messages
            const Message = Parse.Object.extend("Message");
            const query = new Parse.Query(Message);
            
            if (type === 'public') {
                query.equalTo("chatType", "public");
                query.equalTo("chatId", "public");
            } else {
                query.equalTo("chatType", "private");
                query.equalTo("chatId", chatId);
            }
            
            query.descending("createdAt");
            query.limit(100);
            const results = await query.find();
            
            messagesContainer.innerHTML = '';
            const messagesList = results.reverse();
            
            for (const msg of messagesList) {
                appendMessage(msg);
            }
            
            // Subscribe to new messages
            const subscription = await query.subscribe();
            subscription.on('create', (msg) => {
                appendMessage(msg);
            });
            messagesSubscription = subscription;
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Append a single message
        function appendMessage(msg) {
            const isSent = msg.get('senderId') === currentUser.id;
            const senderName = msg.get('senderName');
            const content = msg.get('content');
            const messageType = msg.get('type') || 'text';
            const timestamp = msg.get('createdAt');
            const isEdited = msg.get('edited') || false;
            const messageId = msg.id;
            
            const { text, embeds } = detectLinks(content);
            
            let contentHtml = `<div class="message-content">${escapeHtml(text)}</div>`;
            
            if (embeds && embeds.length > 0) {
                embeds.forEach(embed => {
                    if (embed.type === 'youtube') {
                        contentHtml += `
                            <div class="link-embed">
                                <div class="embed-video">
                                    <iframe src="${embed.url}" frameborder="0" allowfullscreen></iframe>
                                </div>
                            </div>
                        `;
                    } else if (embed.type === 'link') {
                        contentHtml += `
                            <a href="${embed.url}" target="_blank" class="link-embed embed-link">
                                <div class="embed-url">${escapeHtml(embed.url)}</div>
                                <div class="embed-title">Open Link →</div>
                            </a>
                        `;
                    }
                });
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            messageDiv.onclick = (e) => {
                e.stopPropagation();
                if (isSent) {
                    showActionMenu(messageId, content, e);
                } else if (currentChatType === 'public') {
                    startPrivateChat(senderName);
                }
            };
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <span class="message-sender">${escapeHtml(senderName)}</span>
                    ${contentHtml}
                    <span class="message-time">${formatTime(timestamp)}${isEdited ? '<span class="edited-indicator"> edited</span>' : ''}</span>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content || !currentChat) return;
            
            const Message = Parse.Object.extend("Message");
            const newMessage = new Message();
            newMessage.set("senderId", currentUser.id);
            newMessage.set("senderName", currentUser.get('username'));
            newMessage.set("content", content);
            newMessage.set("type", "text");
            newMessage.set("edited", false);
            
            if (currentChatType === 'public') {
                newMessage.set("chatType", "public");
                newMessage.set("chatId", "public");
            } else {
                newMessage.set("chatType", "private");
                newMessage.set("chatId", currentChat);
            }
            
            await newMessage.save();
            messageInput.value = '';
            messageInput.style.height = 'auto';
        }

        // Edit message
        async function editMessage(messageId, newContent) {
            const query = new Parse.Query("Message");
            const msg = await query.get(messageId);
            msg.set("content", newContent);
            msg.set("edited", true);
            await msg.save();
        }

        // Delete message
        async function deleteMessage(messageId) {
            const query = new Parse.Query("Message");
            const msg = await query.get(messageId);
            await msg.destroy();
        }

        // Show action menu
        function showActionMenu(messageId, content, event) {
            selectedMessage = { id: messageId, content };
            let x = event.clientX || (event.touches ? event.touches[0].clientX : 0);
            let y = event.clientY || (event.touches ? event.touches[0].clientY : 0);
            actionMenu.style.display = 'flex';
            actionMenu.style.left = (x - 70) + 'px';
            actionMenu.style.top = (y - 60) + 'px';
        }

        function closeActionMenu() {
            actionMenu.style.display = 'none';
            selectedMessage = null;
        }

        // Start private chat
        async function startPrivateChat(username) {
            if (username === currentUser.get('username')) {
                showError("You can't chat with yourself");
                return;
            }
            
            const userQuery = new Parse.Query(Parse.User);
            userQuery.equalTo("username", username);
            const otherUser = await userQuery.first();
            
            if (!otherUser) return;
            
            const PrivateChat = Parse.Object.extend("PrivateChat");
            const query = new Parse.Query(PrivateChat);
            query.contains("participants", currentUser.id);
            query.contains("participants", otherUser.id);
            const existing = await query.first();
            
            if (existing) {
                openChat('private', existing.id, username);
            } else {
                const newChat = new PrivateChat();
                newChat.set("participants", [currentUser.id, otherUser.id]);
                await newChat.save();
                openChat('private', newChat.id, username);
            }
            loadChats();
            document.getElementById('newChatModal').style.display = 'none';
        }

        // Load users for new chat
        async function loadUsers(searchTerm) {
            const query = new Parse.Query(Parse.User);
            query.notEqualTo("objectId", currentUser.id);
            if (searchTerm) {
                query.startsWith("username", searchTerm);
            }
            query.limit(20);
            const users = await query.find();
            
            const userList = document.getElementById('userList');
            userList.innerHTML = '';
            for (const user of users) {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.textContent = user.get('username');
                div.onclick = () => startPrivateChat(user.get('username'));
                userList.appendChild(div);
            }
        }

        // Voice recording
        async function startVoiceRecording() {
            if (isRecording) {
                if (mediaRecorder) mediaRecorder.stop();
                isRecording = false;
                document.getElementById('voiceBtn').classList.remove('active');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const Message = Parse.Object.extend("Message");
                        const newMessage = new Message();
                        newMessage.set("senderId", currentUser.id);
                        newMessage.set("senderName", currentUser.get('username'));
                        newMessage.set("content", reader.result);
                        newMessage.set("type", "voice");
                        newMessage.set("edited", false);
                        
                        if (currentChatType === 'public') {
                            newMessage.set("chatType", "public");
                            newMessage.set("chatId", "public");
                        } else {
                            newMessage.set("chatType", "private");
                            newMessage.set("chatId", currentChat);
                        }
                        await newMessage.save();
                        stream.getTracks().forEach(track => track.stop());
                    };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('active');
                setTimeout(() => {
                    if (isRecording) startVoiceRecording();
                }, 60000);
            } catch (err) {
                showError("Microphone access denied");
            }
        }

        // Image upload
        function handleImageUpload(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const Message = Parse.Object.extend("Message");
                    const newMessage = new Message();
                    newMessage.set("senderId", currentUser.id);
                    newMessage.set("senderName", currentUser.get('username'));
                    newMessage.set("content", e.target.result);
                    newMessage.set("type", "image");
                    newMessage.set("edited", false);
                    
                    if (currentChatType === 'public') {
                        newMessage.set("chatType", "public");
                        newMessage.set("chatId", "public");
                    } else {
                        newMessage.set("chatType", "private");
                        newMessage.set("chatId", currentChat);
                    }
                    await newMessage.save();
                };
                reader.readAsDataURL(file);
            }
        }

        // Auth functions
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (!username || !password) return showError('Fill all fields');
            if (password !== confirm) return showError('Passwords do not match');
            if (username.length < 3) return showError('Username must be at least 3 characters');
            
            try {
                const user = new Parse.User();
                user.set("username", username);
                user.set("password", password);
                await user.signUp();
                showSuccess('Account created! Logging in...');
                setTimeout(() => login(username, password), 1500);
            } catch (err) {
                showError(err.message);
            }
        }

        async function login(username, password) {
            try {
                const user = await Parse.User.logIn(username, password);
                currentUser = user;
                sidebarUsername.textContent = user.get('username');
                authScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                await loadChats();
                openChat('public', null, 'Public Chat');
            } catch (err) {
                showError('Invalid username or password');
            }
        }

        async function logout() {
            await Parse.User.logOut();
            currentUser = null;
            authScreen.style.display = 'flex';
            mainApp.style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // Event Listeners
        document.getElementById('loginBtn').onclick = () => {
            login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
        };
        document.getElementById('registerBtn').onclick = register;
        document.getElementById('sidebarLogout').onclick = logout;
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('showRegister').onclick = () => {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('registerPanel').style.display = 'block';
        };
        document.getElementById('showLogin').onclick = () => {
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('registerPanel').style.display = 'none';
        };
        document.getElementById('imageBtn').onclick = () => document.getElementById('imageFile').click();
        document.getElementById('voiceBtn').onclick = startVoiceRecording;
        document.getElementById('imageFile').onchange = (e) => handleImageUpload(e.target.files[0]);
        document.getElementById('newChatBtn').onclick = async () => {
            await loadUsers('');
            document.getElementById('newChatModal').style.display = 'flex';
        };
        document.getElementById('userSearch').oninput = (e) => loadUsers(e.target.value);
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('newChatModal').style.display = 'none';
        document.getElementById('backBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
        
        // Edit/Delete actions
        document.getElementById('editAction').onclick = () => {
            if (selectedMessage) {
                editText.value = selectedMessage.content;
                editModal.style.display = 'flex';
                closeActionMenu();
            }
        };
        document.getElementById('deleteAction').onclick = async () => {
            if (selectedMessage && confirm('Delete this message?')) {
                await deleteMessage(selectedMessage.id);
                closeActionMenu();
                window.location.reload();
            }
        };
        document.getElementById('saveEditBtn').onclick = async () => {
            const newContent = editText.value.trim();
            if (newContent && selectedMessage) {
                await editMessage(selectedMessage.id, newContent);
                editModal.style.display = 'none';
                window.location.reload();
            }
        };
        document.getElementById('cancelEditBtn').onclick = () => editModal.style.display = 'none';
        
        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!actionMenu.contains(e.target)) closeActionMenu();
        });
        
        // Check for existing session
        if (Parse.User.current()) {
            currentUser = Parse.User.current();
            sidebarUsername.textContent = currentUser.get('username');
            authScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            loadChats();
            openChat('public', null, 'Public Chat');
        }
    </script>
</body>
</html>
