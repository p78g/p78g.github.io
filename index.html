<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ShadowChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Auth Forms */
        .auth-container {
            padding: 40px;
            background: #1a1a1a;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .auth-form {
            max-width: 380px;
            width: 100%;
            margin: 0 auto;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: 500;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            font-size: 15px;
            color: #ffffff;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #25D366;
            background: #2f2f2f;
        }

        .input-group input::placeholder {
            color: #6b7280;
        }

        button {
            background: #25D366;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background: #20b859;
            transform: translateY(-1px);
        }

        .switch-auth {
            margin-top: 24px;
            color: #9ca3af;
            font-size: 0.9em;
        }

        .switch-auth a {
            color: #25D366;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .switch-auth a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .success-message {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        /* Notification Permission Banner */
        .notification-banner {
            background: rgba(37, 211, 102, 0.1);
            border: 1px solid rgba(37, 211, 102, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.85em;
        }

        .notification-banner span {
            color: #25D366;
            flex: 1;
        }

        .enable-notif-btn {
            background: rgba(37, 211, 102, 0.2);
            padding: 6px 16px;
            width: auto;
            font-size: 0.85em;
        }

        /* Main App - WhatsApp Style */
        .app-container {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
        }

        /* Header - WhatsApp Style */
        .header {
            background: #1a1a1a;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .header h2 {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-left: auto;
        }

        .username-display {
            color: #25D366;
            font-weight: 600;
            font-size: 0.95em;
            background: rgba(37, 211, 102, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            width: auto;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: none;
        }

        /* Messages Container - WhatsApp Style */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
        }

        /* Message Bubbles - WhatsApp Style */
        .message {
            display: flex;
            margin-bottom: 12px;
            animation: fadeIn 0.2s ease;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #25D366;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1a1a1a;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        .message-sender {
            font-size: 0.7em;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .message.sent .message-sender {
            color: rgba(255, 255, 255, 0.9);
            text-align: right;
        }

        .message.received .message-sender {
            color: #25D366;
        }

        .message-content {
            font-size: 0.95em;
            line-height: 1.4;
            word-break: break-word;
        }

        .message-time {
            font-size: 0.65em;
            margin-top: 4px;
            display: block;
            text-align: right;
            opacity: 0.7;
        }

        .message.sent .message-time {
            color: rgba(255, 255, 255, 0.8);
        }

        .message.received .message-time {
            color: #6b7280;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Area - WhatsApp Style */
        .message-input-container {
            padding: 16px 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            font-size: 15px;
            color: #ffffff;
            resize: none;
            font-family: inherit;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #25D366;
            background: #2f2f2f;
        }

        .message-input::placeholder {
            color: #6b7280;
        }

        .send-btn {
            background: #25D366;
            padding: 12px 24px;
            width: auto;
            border-radius: 24px;
            font-weight: 600;
        }

        .empty-messages {
            text-align: center;
            color: #6b7280;
            padding: 60px 20px;
            font-size: 0.9em;
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }
            
            .message-bubble {
                max-width: 85%;
            }

            .auth-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Authentication Section -->
        <div id="authSection" class="auth-container">
            <div class="auth-form">
                <h1 class="visually-hidden">ShadowChat - Private Messaging Platform</h1>
                
                <!-- Notification Permission Banner -->
                <div id="notificationBanner" class="notification-banner" style="display: none;">
                    <span>🔔 Enable notifications to get alerts for new messages</span>
                    <button onclick="requestNotificationPermission()" class="enable-notif-btn">Enable</button>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <div id="loginForm">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter your username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button onclick="login()">Sign In</button>
                    <div class="switch-auth">
                        No account? <a onclick="showRegister()">Create one</a>
                    </div>
                </div>

                <div id="registerForm" style="display:none;">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" placeholder="Choose a username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Choose a password">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                    </div>
                    <button onclick="register()">Create Account</button>
                    <div class="switch-auth">
                        Already have an account? <a onclick="showLogin()">Sign in</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main App Section -->
        <div id="appSection" class="app-container">
            <div class="header">
                <h2>ShadowChat</h2>
                <div class="user-info">
                    <span class="username-display" id="currentUsername"></span>
                    <button onclick="logout()" class="logout-btn">Exit</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-messages">No messages yet. Start the conversation!</div>
            </div>
            <div class="message-input-container">
                <textarea class="message-input" id="messageInput" rows="1" placeholder="Type a message..."></textarea>
                <button onclick="sendMessage()" class="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // Data storage
        let users = {};
        let messages = [];
        let currentUser = null;
        let lastMessageCount = 0;
        let notificationPermission = false;

        // Notification System - ENABLE THIS!
        function checkNotificationSupport() {
            if (!("Notification" in window)) {
                console.log("This browser does not support notifications");
                return false;
            }
            return true;
        }

        // HOW TO ENABLE NOTIFICATIONS:
        // 1. Click the "Enable" button in the purple/green banner
        // 2. Click "Allow" when the browser popup appears
        // 3. That's it! You'll get notifications for new messages
        function requestNotificationPermission() {
            if (!checkNotificationSupport()) {
                showError("Your browser doesn't support notifications");
                return;
            }

            Notification.requestPermission().then(function(permission) {
                if (permission === "granted") {
                    notificationPermission = true;
                    localStorage.setItem('shadowchat_notifications', 'granted');
                    document.getElementById('notificationBanner').style.display = 'none';
                    showSuccess("✓ Notifications enabled!");
                    
                    // Test notification
                    new Notification("ShadowChat", {
                        body: "You'll now receive alerts for new messages",
                        icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2325D366'%3E%3Cpath d='M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E"
                    });
                } else {
                    showError("Notifications blocked. Enable in browser settings.");
                }
            });
        }

        function sendNotification(sender, message) {
            if (notificationPermission || Notification.permission === "granted") {
                if (sender === currentUser) return;
                
                new Notification(`📨 ${sender}`, {
                    body: message.length > 50 ? message.substring(0, 47) + "..." : message,
                    icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2325D366'%3E%3Cpath d='M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E",
                    silent: false,
                    vibrate: [200, 100, 200]
                });
            }
        }

        // Load data from localStorage
        function loadData() {
            const storedUsers = localStorage.getItem('shadowchat_users');
            const storedMessages = localStorage.getItem('shadowchat_messages');
            const storedNotifPref = localStorage.getItem('shadowchat_notifications');
            
            if (storedUsers) {
                users = JSON.parse(storedUsers);
            } else {
                users = {};
                saveUsers();
            }
            
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
                lastMessageCount = messages.length;
            } else {
                messages = [];
                lastMessageCount = 0;
                saveMessages();
            }
            
            if (storedNotifPref === 'granted' && Notification.permission === "granted") {
                notificationPermission = true;
            } else if (Notification.permission === "granted") {
                notificationPermission = true;
                localStorage.setItem('shadowchat_notifications', 'granted');
            } else if (Notification.permission === "default") {
                document.getElementById('notificationBanner').style.display = 'flex';
            }
        }

        function saveUsers() {
            localStorage.setItem('shadowchat_users', JSON.stringify(users));
        }

        function saveMessages() {
            localStorage.setItem('shadowchat_messages', JSON.stringify(messages));
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }

            if (password.length < 4) {
                showError('Password must be at least 4 characters');
                return;
            }

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            if (users[username]) {
                showError('Username already exists');
                return;
            }

            users[username] = {
                username: username,
                password: btoa(password),
                createdAt: new Date().toISOString()
            };
            saveUsers();

            showSuccess('Account created successfully!');
            setTimeout(() => {
                showLogin();
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }, 1500);
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            const user = users[username];
            if (!user || user.password !== btoa(password)) {
                showError('Invalid username or password');
                return;
            }

            currentUser = username;
            localStorage.setItem('shadowchat_currentUser', currentUser);
            
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'flex';
            document.getElementById('currentUsername').textContent = currentUser;
            
            const storedMessages = localStorage.getItem('shadowchat_messages');
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
                lastMessageCount = messages.length;
            }
            
            loadMessages();
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('shadowchat_currentUser');
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('messagesContainer').innerHTML = '<div class="empty-messages">No messages yet. Start the conversation!</div>';
        }

        function sendMessage() {
            if (!currentUser) return;
            
            const messageInput = document.getElementById('messageInput');
            const content = messageInput.value.trim();
            
            if (!content) return;

            const newMessage = {
                id: Date.now(),
                sender: currentUser,
                content: content,
                timestamp: new Date().toISOString()
            };
            
            messages.push(newMessage);
            saveMessages();
            lastMessageCount = messages.length;
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
            loadMessages();
        }

        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            
            const storedMessages = localStorage.getItem('shadowchat_messages');
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
            }
            
            if (!messages || messages.length === 0) {
                container.innerHTML = '<div class="empty-messages">No messages yet. Start the conversation!</div>';
                return;
            }
            
            const sortedMessages = [...messages].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            container.innerHTML = sortedMessages.map(message => {
                const isSent = message.sender === currentUser;
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}">
                        <div class="message-bubble">
                            <span class="message-sender">${escapeHtml(message.sender)}</span>
                            <div class="message-content">${escapeHtml(message.content)}</div>
                            <span class="message-time">${formatTime(message.timestamp)}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)}m`;
            if (diff < 86400000) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function checkSession() {
            const savedUser = localStorage.getItem('shadowchat_currentUser');
            if (savedUser && users[savedUser]) {
                currentUser = savedUser;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'flex';
                document.getElementById('currentUsername').textContent = currentUser;
                
                const storedMessages = localStorage.getItem('shadowchat_messages');
                if (storedMessages) {
                    messages = JSON.parse(storedMessages);
                    lastMessageCount = messages.length;
                }
                loadMessages();
            }
        }

        // Auto-refresh with notifications
        let refreshInterval = null;
        
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (currentUser) {
                    const storedMessages = localStorage.getItem('shadowchat_messages');
                    if (storedMessages) {
                        const newMessages = JSON.parse(storedMessages);
                        
                        if (newMessages.length > lastMessageCount) {
                            const newMessagesList = newMessages.slice(lastMessageCount);
                            newMessagesList.forEach(msg => {
                                if (msg.sender !== currentUser) {
                                    sendNotification(msg.sender, msg.content);
                                }
                            });
                            messages = newMessages;
                            lastMessageCount = messages.length;
                            loadMessages();
                        } else if (JSON.stringify(messages) !== JSON.stringify(newMessages)) {
                            messages = newMessages;
                            lastMessageCount = messages.length;
                            loadMessages();
                        }
                    }
                }
            }, 2000);
        }

        // Auto-resize textarea
        function autoResizeTextarea() {
            const textarea = document.getElementById('messageInput');
            if (textarea) {
                textarea.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
            }
        }

        // Initialize
        loadData();
        checkSession();
        startAutoRefresh();
        autoResizeTextarea();

        // Enter to send
        document.addEventListener('DOMContentLoaded', () => {
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        });
    </script>
</body>
</html>
