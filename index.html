<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ShadowChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }

        /* Auth Screen */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .auth-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 380px;
        }

        .auth-box h1 {
            background: linear-gradient(135deg, #a78bfa, #ec489a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            font-size: 15px;
            color: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #25D366;
        }

        .auth-btn {
            background: #25D366;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .switch-auth {
            text-align: center;
            margin-top: 20px;
            color: #9ca3af;
        }

        .switch-auth a {
            color: #25D366;
            cursor: pointer;
        }

        .error-msg, .success-msg {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .error-msg {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .success-msg {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        /* Main App - Full Screen Chat */
        .app-main {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #0a0a0a;
        }

        .chat-header {
            background: #1a1a1a;
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .username-display {
            color: #25D366;
            font-weight: 600;
            background: rgba(37, 211, 102, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: none;
            color: white;
            font-size: 14px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            position: relative;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            cursor: pointer;
        }

        .message.sent .message-bubble {
            background: #25D366;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1a1a1a;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        .message-sender {
            font-size: 0.7em;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .message.sent .message-sender {
            text-align: right;
        }

        .message.received .message-sender {
            color: #25D366;
        }

        .message-content {
            font-size: 0.95em;
            line-height: 1.4;
            word-break: break-word;
        }

        .link-embed {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .embed-video iframe {
            width: 100%;
            height: 225px;
            border: none;
        }

        .embed-link {
            padding: 12px;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .embed-url {
            font-size: 0.7em;
            opacity: 0.7;
            word-break: break-all;
        }

        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 4px;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .edited-indicator {
            font-size: 0.7em;
            margin-left: 6px;
            color: #a78bfa;
        }

        .message-time {
            font-size: 0.65em;
            margin-top: 4px;
            display: block;
            text-align: right;
            opacity: 0.7;
        }

        .action-menu {
            position: fixed;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            z-index: 1000;
            min-width: 140px;
        }

        .action-menu-item {
            padding: 10px 16px;
            background: none;
            border: none;
            color: white;
            text-align: left;
            cursor: pointer;
            border-radius: 10px;
        }

        .action-menu-item:hover {
            background: #3a3a3a;
        }

        .action-menu-item.delete {
            color: #f87171;
        }

        .message-input-container {
            padding: 16px 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-buttons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: #2a2a2a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: #9ca3af;
            fill: none;
        }

        .icon-btn.active {
            background: #f87171;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            color: white;
            resize: none;
            font-family: inherit;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #25D366;
        }

        .send-btn {
            background: #25D366;
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }

        @media (max-width: 768px) {
            .message-bubble {
                max-width: 85%;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .messages-container {
                padding: 12px;
            }
            .message-input-container {
                padding: 12px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/parse/4.2.0/parse.min.js"></script>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-box">
            <h1>ShadowChat</h1>
            <div id="authError" class="error-msg"></div>
            <div id="authSuccess" class="success-msg"></div>
            
            <div id="loginPanel">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
                <button class="auth-btn" id="loginBtn">Sign In</button>
                <div class="switch-auth">
                    No account? <a id="showRegister">Create one</a>
                </div>
            </div>

            <div id="registerPanel" style="display:none;">
                <div class="input-group">
                    <input type="text" id="regUsername" placeholder="Username">
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Password">
                </div>
                <div class="input-group">
                    <input type="password" id="regConfirm" placeholder="Confirm Password">
                </div>
                <button class="auth-btn" id="registerBtn">Create Account</button>
                <div class="switch-auth">
                    Already have an account? <a id="showLogin">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App - Full Screen Chat -->
    <div id="mainApp" class="app-main" style="display:none;">
        <div class="chat-header">
            <div class="chat-title">Public Chat</div>
            <div class="user-controls">
                <span class="username-display" id="sidebarUsername"></span>
                <button class="logout-btn" id="sidebarLogout">Exit</button>
            </div>
        </div>
        <div class="messages-container" id="messagesContainer">
            <div style="text-align:center; color:#6b7280; padding:40px;">Loading messages...</div>
        </div>
        <div class="message-input-container">
            <div class="input-buttons">
                <button class="icon-btn" id="imageBtn">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
                        <circle cx="8.5" cy="8.5" r="2.5" />
                        <path d="M21 15l-5-4-3 3-4-4-5 5" />
                    </svg>
                </button>
                <button class="icon-btn" id="voiceBtn">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                    </svg>
                </button>
            </div>
            <textarea id="messageInput" class="message-input" rows="1" placeholder="Type a message..."></textarea>
            <button id="sendBtn" class="send-btn">Send</button>
        </div>
    </div>

    <input type="file" id="imageFile" accept="image/*" style="display:none;">
    
    <!-- Action Menu -->
    <div id="actionMenu" class="action-menu">
        <button id="editAction" class="action-menu-item">Edit</button>
        <div style="height:1px; background:#3a3a3a; margin:4px 0;"></div>
        <button id="deleteAction" class="action-menu-item delete">Delete</button>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 style="color:white; margin-bottom:16px;">Edit Message</h3>
            <textarea id="editText" rows="3" style="width:100%; padding:12px; background:#2a2a2a; border:1px solid #3a3a3a; border-radius:12px; color:white; margin:16px 0;"></textarea>
            <div style="display:flex; gap:12px;">
                <button id="saveEditBtn" style="flex:1; background:#25D366; padding:10px; border:none; border-radius:12px; color:white;">Save</button>
                <button id="cancelEditBtn" style="flex:1; background:#3a3a3a; padding:10px; border:none; border-radius:12px; color:white;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        Parse.initialize("af3nhQVRaFT5o5ZjYyQfztZZSMxCNT6VFhevLQvZ", "AjRAxMvX8gNQMIGHcJ0icjaIZRa8og37GF9wjDLU");
        Parse.serverURL = 'https://parseapi.back4app.com/';

        let currentUser = null;
        let messagesSubscription = null;
        let selectedMessage = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let refreshInterval = null;

        // DOM Elements
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        const authError = document.getElementById('authError');
        const authSuccess = document.getElementById('authSuccess');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sidebarUsername = document.getElementById('sidebarUsername');
        const actionMenu = document.getElementById('actionMenu');
        const editModal = document.getElementById('editModal');
        const editText = document.getElementById('editText');

        function showError(msg) {
            authError.textContent = msg;
            authError.style.display = 'block';
            setTimeout(() => authError.style.display = 'none', 3000);
        }

        function showSuccess(msg) {
            authSuccess.textContent = msg;
            authSuccess.style.display = 'block';
            setTimeout(() => authSuccess.style.display = 'none', 3000);
        }

        function formatTime(date) {
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'now';
            if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
            if (diff < 86400000) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function detectLinks(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const urls = text.match(urlRegex);
            if (!urls) return { text, embeds: [] };
            let processedText = text;
            const embeds = [];
            for (const url of urls) {
                if (url.includes('youtube.com/watch') || url.includes('youtu.be/')) {
                    let videoId = '';
                    if (url.includes('youtu.be/')) {
                        videoId = url.split('youtu.be/')[1].split('?')[0];
                    } else {
                        videoId = url.split('v=')[1]?.split('&')[0];
                    }
                    if (videoId) {
                        embeds.push({ type: 'youtube', url: `https://www.youtube.com/embed/${videoId}` });
                        processedText = processedText.replace(url, '');
                    }
                } else {
                    embeds.push({ type: 'link', url: url });
                }
            }
            return { text: processedText.trim(), embeds };
        }

        // Load messages
        async function loadMessages() {
            try {
                const Message = Parse.Object.extend("Message");
                const query = new Parse.Query(Message);
                query.equalTo("chatType", "public");
                query.descending("createdAt");
                query.limit(100);
                const results = await query.find();
                
                messagesContainer.innerHTML = '';
                const messagesList = results.reverse();
                
                for (const msg of messagesList) {
                    appendMessage(msg);
                }
                
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            } catch (err) {
                console.error("Error loading messages:", err);
            }
        }

        // Append a single message
        function appendMessage(msg) {
            const isSent = msg.get('senderId') === currentUser.id;
            const senderName = msg.get('senderName');
            const content = msg.get('content');
            const messageType = msg.get('type') || 'text';
            const timestamp = msg.get('createdAt');
            const isEdited = msg.get('edited') || false;
            const messageId = msg.id;
            
            const { text, embeds } = detectLinks(content);
            
            let contentHtml = `<div class="message-content">${escapeHtml(text)}</div>`;
            
            if (messageType === 'image') {
                contentHtml = `<img src="${content}" class="message-image" onclick="window.open('${content}')">`;
            } else if (messageType === 'voice') {
                contentHtml = `
                    <div class="voice-message">
                        <button class="play-btn" onclick="playVoice('${content}', this)">
                            <svg viewBox="0 0 24 24" fill="white" width="16" height="16">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                        </button>
                        <span>Voice note</span>
                    </div>
                `;
            } else if (embeds && embeds.length > 0) {
                embeds.forEach(embed => {
                    if (embed.type === 'youtube') {
                        contentHtml += `
                            <div class="link-embed">
                                <div class="embed-video">
                                    <iframe src="${embed.url}" frameborder="0" allowfullscreen></iframe>
                                </div>
                            </div>
                        `;
                    } else if (embed.type === 'link') {
                        contentHtml += `
                            <a href="${embed.url}" target="_blank" class="link-embed embed-link">
                                <div class="embed-url">${escapeHtml(embed.url)}</div>
                                <div class="embed-title">Open Link →</div>
                            </a>
                        `;
                    }
                });
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            if (isSent) {
                messageDiv.onclick = (e) => {
                    e.stopPropagation();
                    showActionMenu(messageId, content, e);
                };
            }
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <span class="message-sender">${escapeHtml(senderName)}</span>
                    ${contentHtml}
                    <span class="message-time">${formatTime(timestamp)}${isEdited ? '<span class="edited-indicator"> edited</span>' : ''}</span>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Send message
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;
            
            try {
                const Message = Parse.Object.extend("Message");
                const newMessage = new Message();
                newMessage.set("senderId", currentUser.id);
                newMessage.set("senderName", currentUser.get('username'));
                newMessage.set("content", content);
                newMessage.set("type", "text");
                newMessage.set("edited", false);
                newMessage.set("chatType", "public");
                newMessage.set("chatId", "public");
                
                await newMessage.save();
                messageInput.value = '';
                messageInput.style.height = 'auto';
            } catch (err) {
                showError("Error sending message");
            }
        }

        // Edit message
        async function editMessage(messageId, newContent) {
            try {
                const query = new Parse.Query("Message");
                const msg = await query.get(messageId);
                msg.set("content", newContent);
                msg.set("edited", true);
                await msg.save();
                await loadMessages();
            } catch (err) {
                showError("Error editing message");
            }
        }

        // Delete message
        async function deleteMessage(messageId) {
            try {
                const query = new Parse.Query("Message");
                const msg = await query.get(messageId);
                await msg.destroy();
                await loadMessages();
            } catch (err) {
                showError("Error deleting message");
            }
        }

        // Show action menu
        function showActionMenu(messageId, content, event) {
            selectedMessage = { id: messageId, content };
            let x = event.clientX || (event.touches ? event.touches[0].clientX : 0);
            let y = event.clientY || (event.touches ? event.touches[0].clientY : 0);
            actionMenu.style.display = 'flex';
            actionMenu.style.left = (x - 70) + 'px';
            actionMenu.style.top = (y - 60) + 'px';
        }

        function closeActionMenu() {
            actionMenu.style.display = 'none';
            selectedMessage = null;
        }

        // Voice recording
        function playVoice(audioData, btn) {
            const audio = new Audio(audioData);
            audio.play();
            btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="16" height="16"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
            audio.onended = () => {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
            };
        }
        
        window.playVoice = playVoice;
        
        async function startVoiceRecording() {
            if (isRecording) {
                if (mediaRecorder) mediaRecorder.stop();
                isRecording = false;
                document.getElementById('voiceBtn').classList.remove('active');
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const Message = Parse.Object.extend("Message");
                        const newMessage = new Message();
                        newMessage.set("senderId", currentUser.id);
                        newMessage.set("senderName", currentUser.get('username'));
                        newMessage.set("content", reader.result);
                        newMessage.set("type", "voice");
                        newMessage.set("edited", false);
                        newMessage.set("chatType", "public");
                        newMessage.set("chatId", "public");
                        await newMessage.save();
                        stream.getTracks().forEach(track => track.stop());
                    };
                    reader.readAsDataURL(audioBlob);
                };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('voiceBtn').classList.add('active');
                setTimeout(() => {
                    if (isRecording) startVoiceRecording();
                }, 60000);
            } catch (err) {
                showError("Microphone access denied");
            }
        }
        
        window.startVoiceRecording = startVoiceRecording;

        // Image upload
        function handleImageUpload(file) {
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const Message = Parse.Object.extend("Message");
                    const newMessage = new Message();
                    newMessage.set("senderId", currentUser.id);
                    newMessage.set("senderName", currentUser.get('username'));
                    newMessage.set("content", e.target.result);
                    newMessage.set("type", "image");
                    newMessage.set("edited", false);
                    newMessage.set("chatType", "public");
                    newMessage.set("chatId", "public");
                    await newMessage.save();
                };
                reader.readAsDataURL(file);
            }
        }

        // Setup real-time subscription
        function setupRealtimeSubscription() {
            if (messagesSubscription) {
                messagesSubscription.unsubscribe();
            }
            
            const Message = Parse.Object.extend("Message");
            const query = new Parse.Query(Message);
            query.equalTo("chatType", "public");
            
            query.subscribe().then(subscription => {
                messagesSubscription = subscription;
                subscription.on('create', (msg) => {
                    appendMessage(msg);
                });
            }).catch(err => {
                console.error("Subscription error:", err);
            });
        }

        // Auth functions
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (!username || !password) return showError('Fill all fields');
            if (password !== confirm) return showError('Passwords do not match');
            if (username.length < 3) return showError('Username must be at least 3 characters');
            
            try {
                const user = new Parse.User();
                user.set("username", username);
                user.set("password", password);
                await user.signUp();
                showSuccess('Account created! Logging in...');
                setTimeout(() => login(username, password), 1500);
            } catch (err) {
                showError(err.message);
            }
        }

        async function login(username, password) {
            try {
                const user = await Parse.User.logIn(username, password);
                currentUser = user;
                sidebarUsername.textContent = user.get('username');
                authScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                await loadMessages();
                setupRealtimeSubscription();
                
                // Auto-refresh every 3 seconds as backup
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(async () => {
                    if (currentUser) {
                        await loadMessages();
                    }
                }, 3000);
            } catch (err) {
                showError('Invalid username or password');
            }
        }

        async function logout() {
            await Parse.User.logOut();
            if (refreshInterval) clearInterval(refreshInterval);
            if (messagesSubscription) messagesSubscription.unsubscribe();
            currentUser = null;
            authScreen.style.display = 'flex';
            mainApp.style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        // Event Listeners
        document.getElementById('loginBtn').onclick = () => login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
        document.getElementById('registerBtn').onclick = register;
        document.getElementById('sidebarLogout').onclick = logout;
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('showRegister').onclick = () => {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('registerPanel').style.display = 'block';
        };
        document.getElementById('showLogin').onclick = () => {
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('registerPanel').style.display = 'none';
        };
        document.getElementById('imageBtn').onclick = () => document.getElementById('imageFile').click();
        document.getElementById('voiceBtn').onclick = startVoiceRecording;
        document.getElementById('imageFile').onchange = (e) => handleImageUpload(e.target.files[0]);
        
        // Edit/Delete actions
        document.getElementById('editAction').onclick = () => {
            if (selectedMessage) {
                editText.value = selectedMessage.content;
                editModal.style.display = 'flex';
                closeActionMenu();
            }
        };
        document.getElementById('deleteAction').onclick = async () => {
            if (selectedMessage && confirm('Delete this message?')) {
                await deleteMessage(selectedMessage.id);
                closeActionMenu();
            }
        };
        document.getElementById('saveEditBtn').onclick = async () => {
            const newContent = editText.value.trim();
            if (newContent && selectedMessage) {
                await editMessage(selectedMessage.id, newContent);
                editModal.style.display = 'none';
            }
        };
        document.getElementById('cancelEditBtn').onclick = () => editModal.style.display = 'none';
        
        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.addEventListener('click', (e) => {
            if (!actionMenu.contains(e.target)) closeActionMenu();
        });
        
        // Check for existing session
        if (Parse.User.current()) {
            currentUser = Parse.User.current();
            sidebarUsername.textContent = currentUser.get('username');
            authScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            loadMessages();
            setupRealtimeSubscription();
            
            refreshInterval = setInterval(async () => {
                if (currentUser) {
                    await loadMessages();
                }
            }, 3000);
        }
    </script>
</body>
</html>
