<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ShadowChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Auth Forms */
        .auth-container {
            padding: 40px;
            background: #1a1a1a;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .auth-form {
            max-width: 380px;
            width: 100%;
            margin: 0 auto;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-weight: 500;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            font-size: 15px;
            color: #ffffff;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #25D366;
            background: #2f2f2f;
        }

        button {
            background: #25D366;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background: #20b859;
            transform: translateY(-1px);
        }

        .switch-auth {
            margin-top: 24px;
            color: #9ca3af;
            font-size: 0.9em;
        }

        .switch-auth a {
            color: #25D366;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .error-message, .success-message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.9em;
        }

        .error-message {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .success-message {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        /* Notification Banner */
        .notification-banner {
            background: rgba(37, 211, 102, 0.1);
            border: 1px solid rgba(37, 211, 102, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.85em;
        }

        .notification-banner svg {
            width: 20px;
            height: 20px;
            stroke: #25D366;
            stroke-width: 1.5;
            fill: none;
        }

        .notification-banner span {
            color: #25D366;
            flex: 1;
        }

        .enable-notif-btn {
            background: rgba(37, 211, 102, 0.2);
            padding: 6px 16px;
            width: auto;
        }

        /* Main App */
        .app-container {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #0a0a0a;
        }

        .header {
            background: #1a1a1a;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-left: auto;
        }

        .username-display {
            color: #25D366;
            font-weight: 600;
            background: rgba(37, 211, 102, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px;
            width: auto;
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
        }

        /* Message Bubbles - Long press for menu */
        .message {
            display: flex;
            margin-bottom: 12px;
            animation: fadeIn 0.2s ease;
            position: relative;
            user-select: none;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: #25D366;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #1a1a1a;
            color: #e5e7eb;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        .message-sender {
            font-size: 0.7em;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .message.sent .message-sender {
            color: rgba(255, 255, 255, 0.9);
            text-align: right;
        }

        .message.received .message-sender {
            color: #25D366;
        }

        .message-content {
            font-size: 0.95em;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Link Embed Styling */
        .link-embed {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .embed-video {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
        }

        .embed-video iframe {
            width: 100%;
            height: 225px;
            border: none;
            border-radius: 8px;
        }

        .embed-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            text-decoration: none;
            color: inherit;
            pointer-events: auto;
        }

        .embed-url {
            font-size: 0.7em;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .embed-title {
            font-weight: 600;
            font-size: 0.85em;
        }

        /* Image Styling */
        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 4px;
            pointer-events: auto;
        }

        /* Voice Message Styling - SVG Play/Pause */
        .voice-message {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 200px;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
            border: none;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .message.sent .play-btn {
            background: rgba(0, 0, 0, 0.2);
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .voice-duration {
            font-size: 0.8em;
            color: #9ca3af;
        }

        .edited-indicator {
            font-size: 0.7em;
            font-weight: 500;
            margin-left: 6px;
            color: #a78bfa;
            background: rgba(167, 139, 250, 0.15);
            padding: 2px 6px;
            border-radius: 12px;
            display: inline-block;
        }

        .message-time {
            font-size: 0.65em;
            margin-top: 4px;
            display: block;
            text-align: right;
            opacity: 0.7;
        }

        /* Action Menu Popup */
        .action-menu {
            position: fixed;
            background: #2a2a2a;
            border-radius: 16px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            min-width: 140px;
            animation: menuFadeIn 0.15s ease;
        }

        @keyframes menuFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .action-menu-item {
            padding: 10px 16px;
            background: none;
            border: none;
            color: #e5e7eb;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.1s;
            width: 100%;
        }

        .action-menu-item:hover {
            background: #3a3a3a;
            transform: none;
        }

        .action-menu-item.delete {
            color: #f87171;
        }

        .action-menu-item.delete:hover {
            background: rgba(248, 113, 113, 0.15);
        }

        .action-menu-divider {
            height: 1px;
            background: #3a3a3a;
            margin: 4px 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Input Area */
        .message-input-container {
            padding: 16px 20px;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-buttons {
            display: flex;
            gap: 8px;
        }

        /* Clean SVG Icons */
        .icon-btn {
            background: #2a2a2a;
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: none;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke: #9ca3af;
            stroke-width: 1.5;
            fill: none;
        }

        .icon-btn:hover svg {
            stroke: #25D366;
        }

        .icon-btn.active {
            background: #f87171;
        }

        .icon-btn.active svg {
            stroke: white;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            font-size: 15px;
            color: #ffffff;
            resize: none;
            font-family: inherit;
            max-height: 100px;
        }

        .message-input:focus {
            outline: none;
            border-color: #25D366;
        }

        .send-btn {
            background: #25D366;
            padding: 12px 24px;
            width: auto;
            border-radius: 24px;
        }

        .empty-messages {
            text-align: center;
            color: #6b7280;
            padding: 60px 20px;
        }

        /* Modal for editing */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 16px;
        }

        .modal-content textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            margin: 16px 0;
            font-family: inherit;
            resize: vertical;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            width: auto;
            padding: 10px 20px;
        }

        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Section -->
        <div id="authSection" class="auth-container">
            <div class="auth-form">
                <h1 class="visually-hidden">ShadowChat</h1>
                <div id="notificationBanner" class="notification-banner" style="display: none;">
                    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span>Enable notifications</span>
                    <button onclick="requestNotificationPermission()" class="enable-notif-btn">Enable</button>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <div id="loginForm">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter password">
                    </div>
                    <button onclick="login()">Sign In</button>
                    <div class="switch-auth">
                        No account? <a onclick="showRegister()">Create one</a>
                    </div>
                </div>

                <div id="registerForm" style="display:none;">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" placeholder="Choose username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Choose password">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password">
                    </div>
                    <button onclick="register()">Create Account</button>
                    <div class="switch-auth">
                        Already have an account? <a onclick="showLogin()">Sign in</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="appSection" class="app-container">
            <div class="header">
                <div class="user-info">
                    <span class="username-display" id="currentUsername"></span>
                    <button onclick="logout()" class="logout-btn">Exit</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="message-input-container">
                <div class="input-buttons">
                    <button class="icon-btn" onclick="document.getElementById('imageInput').click()">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" />
                            <circle cx="8.5" cy="8.5" r="2.5" />
                            <path d="M21 15l-5-4-3 3-4-4-5 5" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="micBtn" onclick="startVoiceRecording()">
                        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" />
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                            <line x1="12" y1="19" x2="12" y2="22" />
                        </svg>
                    </button>
                </div>
                <textarea class="message-input" id="messageInput" rows="1" placeholder="Type a message..."></textarea>
                <button onclick="sendMessage()" class="send-btn">Send</button>
            </div>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">

    <!-- Action Menu Popup -->
    <div id="actionMenu" class="action-menu">
        <button class="action-menu-item" id="editAction">Edit</button>
        <div class="action-menu-divider"></div>
        <button class="action-menu-item delete" id="deleteAction">Delete</button>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Message</h3>
            <textarea id="editText" rows="3"></textarea>
            <div class="modal-buttons">
                <button onclick="saveEdit()">Save</button>
                <button onclick="closeEditModal()" style="background: #3a3a3a;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <img id="modalImage" src="">
    </div>

    <script>
        let users = {};
        let messages = [];
        let currentUser = null;
        let lastMessageCount = 0;
        let editingMessageId = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let selectedMessageId = null;
        let currentAudio = null;
        let pressTimer = null;
        let longPressTriggered = false;

        // Notification System
        function requestNotificationPermission() {
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    localStorage.setItem('shadowchat_notifications', 'granted');
                    document.getElementById('notificationBanner').style.display = 'none';
                    showSuccess("Notifications enabled");
                }
            });
        }

        // Long press handlers
        function startLongPress(messageId, event) {
            // Ignore if the target is inside an interactive element (iframe, link, image, play button)
            const target = event.target;
            if (target.closest('.embed-video iframe') || 
                target.closest('.embed-link') || 
                target.closest('.message-image') || 
                target.closest('.play-btn')) {
                return;
            }
            
            longPressTriggered = false;
            pressTimer = setTimeout(() => {
                longPressTriggered = true;
                showActionMenu(messageId, event);
            }, 500);
        }
        
        function cancelLongPress() {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        }
        
        // Action Menu
        function showActionMenu(messageId, event) {
            const message = messages.find(m => m.id === messageId);
            if (!message || message.sender !== currentUser) return;
            
            selectedMessageId = messageId;
            const menu = document.getElementById('actionMenu');
            
            let x, y;
            if (event.touches) {
                x = event.touches[0].clientX;
                y = event.touches[0].clientY;
                event.preventDefault();
            } else {
                x = event.clientX;
                y = event.clientY;
            }
            
            menu.style.display = 'flex';
            menu.style.left = (x - 70) + 'px';
            menu.style.top = (y - 60) + 'px';
            
            // Close menu when clicking outside
            setTimeout(() => {
                document.addEventListener('click', closeActionMenu);
                document.addEventListener('touchstart', closeActionMenu);
            }, 0);
        }
        
        function closeActionMenu() {
            document.getElementById('actionMenu').style.display = 'none';
            selectedMessageId = null;
            document.removeEventListener('click', closeActionMenu);
            document.removeEventListener('touchstart', closeActionMenu);
        }
        
        function editSelectedMessage() {
            if (selectedMessageId) {
                editMessage(selectedMessageId);
                closeActionMenu();
            }
        }
        
        function deleteSelectedMessage() {
            if (selectedMessageId) {
                if (confirm("Delete this message?")) {
                    deleteMessage(selectedMessageId);
                }
                closeActionMenu();
            }
        }
        
        // Voice Recording
        async function startVoiceRecording() {
            if (isRecording) {
                stopVoiceRecording();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = event => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const audioData = reader.result;
                        sendVoiceMessage(audioData);
                    };
                    reader.readAsDataURL(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isRecording = true;
                const micBtn = document.getElementById('micBtn');
                micBtn.classList.add('active');
                showSuccess("Recording... Tap again to stop");
                
                setTimeout(() => {
                    if (isRecording) stopVoiceRecording();
                }, 60000);
            } catch (err) {
                showError("Microphone access denied");
            }
        }
        
        function stopVoiceRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                const micBtn = document.getElementById('micBtn');
                micBtn.classList.remove('active');
            }
        }
        
        function sendVoiceMessage(audioData) {
            if (!currentUser) return;
            const newMessage = {
                id: Date.now(),
                sender: currentUser,
                type: 'voice',
                content: audioData,
                timestamp: new Date().toISOString(),
                edited: false
            };
            messages.push(newMessage);
            saveMessages();
            loadMessages();
        }
        
        // Play Voice with SVG toggle
        function playVoice(audioData, btnElement) {
            if (currentAudio && !currentAudio.paused) {
                currentAudio.pause();
                currentAudio = null;
                updatePlayButtonIcon(btnElement, false);
                return;
            }
            
            const audio = new Audio(audioData);
            currentAudio = audio;
            updatePlayButtonIcon(btnElement, true);
            
            audio.play();
            audio.onended = () => {
                currentAudio = null;
                updatePlayButtonIcon(btnElement, false);
            };
        }
        
        function updatePlayButtonIcon(btn, isPlaying) {
            if (isPlaying) {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="16" height="16">
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>`;
            } else {
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="white" width="16" height="16">
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>`;
            }
        }
        
        // Image Upload
        function handleImageUpload(input) {
            const file = input.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    sendImageMessage(e.target.result);
                };
                reader.readAsDataURL(file);
            }
            input.value = '';
        }
        
        function sendImageMessage(imageData) {
            if (!currentUser) return;
            const newMessage = {
                id: Date.now(),
                sender: currentUser,
                type: 'image',
                content: imageData,
                timestamp: new Date().toISOString(),
                edited: false
            };
            messages.push(newMessage);
            saveMessages();
            loadMessages();
        }
        
        // Detect and embed links
        function detectAndEmbedLinks(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const urls = text.match(urlRegex);
            
            if (!urls) return { text, embeds: [] };
            
            let processedText = text;
            const embeds = [];
            
            for (const url of urls) {
                if (url.includes('youtube.com/watch') || url.includes('youtu.be/')) {
                    let videoId = '';
                    if (url.includes('youtu.be/')) {
                        videoId = url.split('youtu.be/')[1].split('?')[0];
                    } else {
                        videoId = url.split('v=')[1]?.split('&')[0];
                    }
                    if (videoId) {
                        embeds.push({
                            type: 'youtube',
                            url: `https://www.youtube.com/embed/${videoId}`,
                            originalUrl: url
                        });
                        processedText = processedText.replace(url, '');
                    }
                } 
                else if (url.includes('vimeo.com/')) {
                    const vimeoId = url.split('vimeo.com/')[1].split('?')[0];
                    embeds.push({
                        type: 'vimeo',
                        url: `https://player.vimeo.com/video/${vimeoId}`,
                        originalUrl: url
                    });
                    processedText = processedText.replace(url, '');
                }
                else {
                    embeds.push({
                        type: 'link',
                        url: url,
                        originalUrl: url
                    });
                }
            }
            
            return { text: processedText.trim(), embeds };
        }
        
        // Edit Message
        function editMessage(id) {
            const message = messages.find(m => m.id === id);
            if (message && message.sender === currentUser) {
                editingMessageId = id;
                document.getElementById('editText').value = message.content;
                document.getElementById('editModal').style.display = 'flex';
            }
        }
        
        function saveEdit() {
            const newContent = document.getElementById('editText').value.trim();
            if (newContent && editingMessageId) {
                const messageIndex = messages.findIndex(m => m.id === editingMessageId);
                if (messageIndex !== -1 && messages[messageIndex].sender === currentUser) {
                    messages[messageIndex].content = newContent;
                    messages[messageIndex].edited = true;
                    messages[messageIndex].editedAt = new Date().toISOString();
                    saveMessages();
                    loadMessages();
                }
            }
            closeEditModal();
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editingMessageId = null;
        }
        
        // Delete Message
        function deleteMessage(id) {
            const messageIndex = messages.findIndex(m => m.id === id);
            if (messageIndex !== -1 && messages[messageIndex].sender === currentUser) {
                messages.splice(messageIndex, 1);
                saveMessages();
                loadMessages();
            }
        }
        
        // View Image
        function viewImage(imageData) {
            document.getElementById('modalImage').src = imageData;
            document.getElementById('imageModal').style.display = 'flex';
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }
        
        // Core Functions
        function loadData() {
            const storedUsers = localStorage.getItem('shadowchat_users');
            const storedMessages = localStorage.getItem('shadowchat_messages');
            if (storedUsers) users = JSON.parse(storedUsers);
            else users = {};
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
                lastMessageCount = messages.length;
            } else messages = [];
            
            if (Notification.permission === "default") {
                document.getElementById('notificationBanner').style.display = 'flex';
            }
        }
        
        function saveUsers() {
            localStorage.setItem('shadowchat_users', JSON.stringify(users));
        }
        
        function saveMessages() {
            localStorage.setItem('shadowchat_messages', JSON.stringify(messages));
            lastMessageCount = messages.length;
        }
        
        function showError(msg) {
            const div = document.getElementById('errorMessage');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
        
        function showSuccess(msg) {
            const div = document.getElementById('successMessage');
            div.textContent = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
        
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!username || !password) {
                showError('Fill all fields');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            if (users[username]) {
                showError('Username exists');
                return;
            }
            
            users[username] = {
                username: username,
                password: btoa(password),
                createdAt: new Date().toISOString()
            };
            saveUsers();
            showSuccess('Account created!');
            setTimeout(() => {
                showLogin();
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            }, 1500);
        }
        
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const user = users[username];
            
            if (!user || user.password !== btoa(password)) {
                showError('Invalid credentials');
                return;
            }
            
            currentUser = username;
            localStorage.setItem('shadowchat_currentUser', currentUser);
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'flex';
            document.getElementById('currentUsername').textContent = currentUser;
            
            // Load messages
            const storedMessages = localStorage.getItem('shadowchat_messages');
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
                lastMessageCount = messages.length;
            }
            loadMessages();
            
            // Clear login fields
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('shadowchat_currentUser');
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('appSection').style.display = 'none';
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            const { text, embeds } = detectAndEmbedLinks(content);
            
            const newMessage = {
                id: Date.now(),
                sender: currentUser,
                type: 'text',
                content: text,
                embeds: embeds,
                timestamp: new Date().toISOString(),
                edited: false
            };
            messages.push(newMessage);
            saveMessages();
            input.value = '';
            input.style.height = 'auto';
            loadMessages();
        }
        
        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            const stored = localStorage.getItem('shadowchat_messages');
            if (stored) messages = JSON.parse(stored);
            
            if (!messages.length) {
                container.innerHTML = '<div class="empty-messages">No messages yet</div>';
                return;
            }
            
            const sorted = [...messages].sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            container.innerHTML = sorted.map(msg => {
                const isSent = msg.sender === currentUser;
                let contentHtml = '';
                
                if (msg.type === 'image') {
                    contentHtml = `<img src="${msg.content}" class="message-image" onclick="viewImage('${msg.content}')" style="pointer-events: auto;">`;
                } else if (msg.type === 'voice') {
                    contentHtml = `
                        <div class="voice-message">
                            <button class="play-btn" onclick="playVoice('${msg.content}', this)" style="pointer-events: auto;">
                                <svg viewBox="0 0 24 24" fill="white" width="16" height="16">
                                    <polygon points="5 3 19 12 5 21 5 3" />
                                </svg>
                            </button>
                            <span class="voice-duration">Voice note</span>
                        </div>
                    `;
                } else {
                    let textContent = escapeHtml(msg.content);
                    if (textContent === '') textContent = ' ';
                    contentHtml = `<div class="message-content">${textContent}</div>`;
                    
                    if (msg.embeds && msg.embeds.length > 0) {
                        msg.embeds.forEach(embed => {
                            if (embed.type === 'youtube' || embed.type === 'vimeo') {
                                contentHtml += `
                                    <div class="link-embed">
                                        <div class="embed-video">
                                            <iframe src="${embed.url}" frameborder="0" allowfullscreen></iframe>
                                        </div>
                                    </div>
                                `;
                            } else if (embed.type === 'link') {
                                contentHtml += `
                                    <a href="${embed.url}" target="_blank" class="link-embed embed-link" style="pointer-events: auto;">
                                        <div class="embed-info">
                                            <div class="embed-url">${escapeHtml(embed.url)}</div>
                                            <div class="embed-title">Open Link</div>
                                        </div>
                                    </a>
                                `;
                            }
                        });
                    }
                }
                
                const editedHtml = msg.edited ? '<span class="edited-indicator">edited</span>' : '';
                
                return `
                    <div class="message ${isSent ? 'sent' : 'received'}"
                         onmousedown="startLongPress(${msg.id}, event)"
                         ontouchstart="startLongPress(${msg.id}, event)"
                         onmouseup="cancelLongPress()"
                         ontouchend="cancelLongPress()"
                         onmouseleave="cancelLongPress()">
                        <div class="message-bubble">
                            <span class="message-sender">${escapeHtml(msg.sender)}</span>
                            ${contentHtml}
                            <span class="message-time">${formatTime(msg.timestamp)}${editedHtml}</span>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function formatTime(ts) {
            const date = new Date(ts);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'now';
            if (diff < 3600000) return `${Math.floor(diff/60000)}m`;
            if (diff < 86400000) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return date.toLocaleDateString([], {month:'short', day:'numeric'});
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function checkSession() {
            const saved = localStorage.getItem('shadowchat_currentUser');
            if (saved && users[saved]) {
                currentUser = saved;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'flex';
                document.getElementById('currentUsername').textContent = currentUser;
                const storedMessages = localStorage.getItem('shadowchat_messages');
                if (storedMessages) {
                    messages = JSON.parse(storedMessages);
                    lastMessageCount = messages.length;
                }
                loadMessages();
            }
        }
        
        // Auto-refresh
        setInterval(() => {
            if (currentUser) {
                const stored = localStorage.getItem('shadowchat_messages');
                if (stored) {
                    const newMsgs = JSON.parse(stored);
                    if (newMsgs.length > lastMessageCount) {
                        loadMessages();
                        lastMessageCount = newMsgs.length;
                    }
                }
            }
        }, 2000);
        
        // Auto-resize textarea
        document.addEventListener('DOMContentLoaded', () => {
            const ta = document.getElementById('messageInput');
            if (ta) {
                ta.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
                });
                ta.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
            
            // Set up action menu button listeners
            document.getElementById('editAction').onclick = editSelectedMessage;
            document.getElementById('deleteAction').onclick = deleteSelectedMessage;
        });
        
        loadData();
        checkSession();
    </script>
</body>
</html>
