<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureMessage - Private Messaging Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* Auth Forms */
        .auth-container {
            padding: 40px;
            background: white;
            text-align: center;
        }

        .auth-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .auth-form h2 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .switch-auth {
            margin-top: 20px;
            color: #666;
        }

        .switch-auth a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .error-message {
            color: #e74c3c;
            background: #fde8e8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        /* Main App */
        .app-container {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .username-display {
            font-weight: bold;
            font-size: 1.1em;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            width: auto;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .message-sender {
            font-weight: bold;
            color: #667eea;
        }

        .message-time {
            color: #999;
            font-size: 0.85em;
        }

        .message-content {
            color: #333;
            line-height: 1.5;
        }

        .message-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            resize: none;
            font-family: inherit;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            width: auto;
            padding: 12px 30px;
        }

        .empty-messages {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }
            
            .message-input-container {
                flex-direction: column;
            }
            
            .send-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Authentication Section -->
        <div id="authSection" class="auth-container">
            <div class="auth-form">
                <h2>📨 SecureMessage</h2>
                <div id="errorMessage" class="error-message"></div>
                
                <div id="loginForm">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter your username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button onclick="login()">Login</button>
                    <div class="switch-auth">
                        Don't have an account? <a onclick="showRegister()">Register here</a>
                    </div>
                </div>

                <div id="registerForm" style="display:none;">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="registerUsername" placeholder="Choose a username">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="Choose a password">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                    </div>
                    <button onclick="register()">Register</button>
                    <div class="switch-auth">
                        Already have an account? <a onclick="showLogin()">Login here</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main App Section -->
        <div id="appSection" class="app-container">
            <div class="header">
                <h2>📨 SecureMessage</h2>
                <div class="user-info">
                    <span class="username-display" id="currentUsername"></span>
                    <button onclick="logout()" class="logout-btn">Logout</button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-messages">No messages yet. Start the conversation!</div>
            </div>
            <div class="message-input-container">
                <textarea class="message-input" id="messageInput" rows="2" placeholder="Type your message here..."></textarea>
                <button onclick="sendMessage()" class="send-btn">Send Message</button>
            </div>
        </div>
    </div>

    <script>
        // Data storage structure
        let users = {};
        let messages = [];
        let currentUser = null;

        // Initialize data from localStorage
        function loadData() {
            const storedUsers = localStorage.getItem('securemessage_users');
            const storedMessages = localStorage.getItem('securemessage_messages');
            
            if (storedUsers) {
                users = JSON.parse(storedUsers);
            } else {
                // Create demo user
                users = {
                    'demo': {
                        username: 'demo',
                        password: btoa('demo123'),
                        createdAt: new Date().toISOString()
                    }
                };
                saveUsers();
            }
            
            if (storedMessages) {
                messages = JSON.parse(storedMessages);
            } else {
                // Add some demo messages
                messages = [
                    {
                        id: Date.now(),
                        sender: 'demo',
                        content: 'Welcome to SecureMessage! This is a demo message.',
                        timestamp: new Date().toISOString()
                    },
                    {
                        id: Date.now() + 1,
                        sender: 'demo',
                        content: 'Create an account and start messaging!',
                        timestamp: new Date().toISOString()
                    }
                ];
                saveMessages();
            }
        }

        function saveUsers() {
            localStorage.setItem('securemessage_users', JSON.stringify(users));
        }

        function saveMessages() {
            localStorage.setItem('securemessage_messages', JSON.stringify(messages));
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }

            if (users[username]) {
                showError('Username already exists');
                return;
            }

            // Create new user
            users[username] = {
                username: username,
                password: btoa(password), // Simple encoding (not secure for production)
                createdAt: new Date().toISOString()
            };
            saveUsers();

            showLogin();
            showError('Account created successfully! Please login.');
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            const user = users[username];
            if (!user || user.password !== btoa(password)) {
                showError('Invalid username or password');
                return;
            }

            currentUser = username;
            localStorage.setItem('securemessage_currentUser', currentUser);
            
            // Switch to main app
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'flex';
            document.getElementById('currentUsername').textContent = currentUser;
            
            loadMessages();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('securemessage_currentUser');
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function sendMessage() {
            if (!currentUser) return;
            
            const messageInput = document.getElementById('messageInput');
            const content = messageInput.value.trim();
            
            if (!content) {
                showError('Please enter a message');
                return;
            }

            const newMessage = {
                id: Date.now(),
                sender: currentUser,
                content: content,
                timestamp: new Date().toISOString()
            };
            
            messages.push(newMessage);
            saveMessages();
            
            messageInput.value = '';
            loadMessages();
        }

        function loadMessages() {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-messages">No messages yet. Start the conversation!</div>';
                return;
            }
            
            // Sort messages by timestamp
            const sortedMessages = [...messages].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            
            container.innerHTML = sortedMessages.map(message => `
                <div class="message">
                    <div class="message-header">
                        <span class="message-sender">${escapeHtml(message.sender)}</span>
                        <span class="message-time">${formatTime(message.timestamp)}</span>
                    </div>
                    <div class="message-content">${escapeHtml(message.content)}</div>
                </div>
            `).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} minutes ago`;
            if (diff < 86400000) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check for existing session
        function checkSession() {
            const savedUser = localStorage.getItem('securemessage_currentUser');
            if (savedUser && users[savedUser]) {
                currentUser = savedUser;
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('appSection').style.display = 'flex';
                document.getElementById('currentUsername').textContent = currentUser;
                loadMessages();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('appSection').style.display = 'none';
            }
        }

        // Auto-refresh messages every 2 seconds
        let refreshInterval = null;
        
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (currentUser) {
                    loadMessages();
                }
            }, 2000);
        }

        // Initialize the app
        loadData();
        checkSession();
        startAutoRefresh();

        // Allow Enter key to send message
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
